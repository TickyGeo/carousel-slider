<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rostov on Don</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div class="slider">
        <div class="carousel">
            <div class="item" style="--i: 0;">
                <img src="img/1.jpg" alt="Image">
            </div>
            <div class="item" style="--i: 1;">
                <img src="img/2.jpg" alt="Image">
            </div>
            <div class="item" style="--i: 2;">
                <img src="img/3.jpg" alt="Image">
            </div>
            <div class="item" style="--i: 3;">
                <img src="img/4.jpg" alt="Image">
            </div>
            <div class="item" style="--i: 4;">
                <img src="img/5.jpg" alt="Image">
            </div>
            <div class="item" style="--i: 5;">
                <img src="img/6.webp" alt="Image">
            </div>
            <div class="item" style="--i: 6;">
                <img src="img/7.png" alt="Image">
            </div>
            <div class="item" style="--i: 7;">
                <img src="img/8.jpg" alt="Image">
            </div>
        </div>
        <button class="btn prev">&#10094;</button>
        <button class="btn next">&#10095;</button>
        <input type="range" class="inp" value="0" max="30">
    </div>

    <script src="main.js"></script>
</body>
</html>
